name: Deploy site to Pages

on:
  push:
    branches:
      - main # Triggers the workflow on pushes to the main branch
  workflow_dispatch: # Allows manual triggering from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow the deployment
permissions:
  contents: read
  pages: write
  id-token: write # required by actions/deploy-pages@v4

# Allow only one concurrent deployment
concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
      # Add steps here to build your site (e.g., run npm install, npm run build)
      # ...
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4 # Uploads the build output as an artifact
        with:
          # Directory containing your build output (e.g., '_site', 'build', 'dist')
          path: '.' 
    
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # Ensures the build job completes first
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # The action to deploy the uploaded artifact
